<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Fundo escuro arredondado -->
  <rect width="64" height="64" rx="14" fill="#0d1f0d"/>
  <!-- Lupa - círculo -->
  <circle cx="27" cy="27" r="13" stroke="#22c55e" stroke-width="4.5" fill="none"/>
  <!-- Lupa - cabo -->
  <line x1="36.5" y1="36.5" x2="52" y2="52" stroke="#22c55e" stroke-width="5" stroke-linecap="round"/>
  <!-- Ponto brilhante dentro da lupa -->
  <circle cx="23" cy="23" r="4" fill="#22c55e" opacity="0.25"/>
  <!-- Letras BR dentro da lupa -->
  <text x="21" y="32" font-family="monospace" font-size="13" font-weight="bold" fill="#22c55e" text-anchor="middle">BR</text>
</svg>
