<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="hex-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C6FF7"/>
      <stop offset="100%" stop-color="#5340E8"/>
    </linearGradient>
    <linearGradient id="check-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#06D6A0"/>
    </linearGradient>
  </defs>

  <!-- Hexágono -->
  <polygon
    points="32,4 56,17 56,47 32,60 8,47 8,17"
    fill="url(#hex-grad)"
  />
  <!-- Borda interna sutil -->
  <polygon
    points="32,7 53,19 53,45 32,57 11,45 11,19"
    fill="none"
    stroke="rgba(255,255,255,0.15)"
    stroke-width="1"
  />

  <!-- Letra C -->
  <path
    d="M38 22 C34 19 26 20 24 27 C22 34 26 42 33 42 C37 42 40 40 41 37"
    stroke="white"
    stroke-width="4"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Check mark verde -->
  <polyline
    points="30,32 34,37 44,25"
    stroke="url(#check-grad)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
